<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Neon Snake Arena — cyberpunk snake with combos, power-ups, and multiple game modes">
  <title>Neon Snake Arena | Arcade Hub</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="gameContainer" class="game-container">

    <!-- Game canvas — fixed 720×576 internally, CSS scales to fit -->
    <canvas id="gameCanvas" class="game-canvas" aria-label="Neon Snake Arena game"></canvas>

    <!-- Mute button (sits in corner, outside canvas) -->
    <button class="mute-btn" id="muteBtn" title="Toggle sound (M)" aria-label="Toggle mute">🔊</button>

    <!-- Loading screen -->
    <div id="loadingScreen" class="loading-screen">
      <div class="loading-content">
        <div class="loading-spinner"></div>
        <h1 class="loading-title">NEON SNAKE</h1>
        <p class="loading-sub">Loading…</p>
      </div>
    </div>

    <!-- Mobile controls (hidden on desktop) -->
    <div class="mobile-controls" id="mobileControls" aria-label="Mobile controls">
      <!-- D-pad -->
      <div class="dpad" role="group" aria-label="Directional pad">
        <button class="dpad-btn dpad-up"    data-dir="up"    aria-label="Move up">▲</button>
        <button class="dpad-btn dpad-left"  data-dir="left"  aria-label="Move left">◀</button>
        <div    class="dpad-btn dpad-center" aria-hidden="true"></div>
        <button class="dpad-btn dpad-right" data-dir="right" aria-label="Move right">▶</button>
        <button class="dpad-btn dpad-down"  data-dir="down"  aria-label="Move down">▼</button>
      </div>

      <!-- Action buttons -->
      <div class="mobile-action-btns">
        <button class="mobile-pause-btn"   aria-label="Pause / Resume">⏸</button>
        <button class="mobile-restart-btn" id="mobileRestartBtn" aria-label="Restart">↺</button>
      </div>
    </div>

  </div><!-- /#gameContainer -->

  <!-- Game Bridge (hub integration) -->
  <script src="/games/game-bridge.js"></script>

  <!-- Core -->
  <script src="js/core/config.js"></script>
  <script src="js/core/state.js"></script>

  <!-- Entities -->
  <script src="js/entities/snake.js"></script>
  <script src="js/entities/food.js"></script>
  <script src="js/entities/power-up.js"></script>
  <script src="js/entities/particle.js"></script>

  <!-- Arcade API (leaderboard + standalone score submission) -->
  <script src="js/systems/arcade-api.js"></script>

  <!-- Systems -->
  <script src="js/systems/input.js"></script>
  <script src="js/systems/renderer.js"></script>
  <script src="js/systems/audio.js"></script>

  <!-- Main controller -->
  <script src="js/main.js"></script>

  <!-- Boot glue -->
  <script>
    // Remove loading screen once game is ready
    window.addEventListener('load', () => {
      setTimeout(() => {
        const ls = document.getElementById('loadingScreen');
        if (ls) {
          ls.style.opacity = '0';
          setTimeout(() => ls.remove(), 500);
        }
      }, 800);
    });

    // Hub integration
    if (window.ArcadeHub) {
      ArcadeHub.onInit(data => {
        console.log('[NeonSnake] Hub init:', data);
      });
    }

    // Mute button wiring
    const muteBtn = document.getElementById('muteBtn');
    if (muteBtn) {
      muteBtn.addEventListener('click', () => {
        if (window.gameInstance && gameInstance()) {
          const enabled = gameInstance().toggleMute();
          muteBtn.textContent = enabled ? '🔊' : '🔇';
          muteBtn.classList.toggle('muted', !enabled);
        }
      });
    }

    // Mobile restart button
    const mobRestart = document.getElementById('mobileRestartBtn');
    if (mobRestart) {
      mobRestart.addEventListener('click', () => {
        if (window.gameInstance && gameInstance()) {
          const g = gameInstance();
          if (g.state.status === 'gameOver' || g.state.status === 'paused') {
            g.restart();
          }
        }
      });
    }
  </script>
</body>
</html>
